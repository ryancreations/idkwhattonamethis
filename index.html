<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyperbeam Multi-Cursor</title>
  <style>
    body { margin: 0; background: #0f0f0f; color: white; font-family: Arial, sans-serif; }
    #container { width: 100vw; height: 100vh; background: #000; }
    .cursor {
      position: absolute;
      font-size: 28px;
      pointer-events: none;
      z-index: 10000;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      transition: transform 0.05s;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <script type="module">
    import Hyperbeam from "https://unpkg.com/@hyperbeam/web@latest/dist/index.js";

    const container = document.getElementById("container");

    // === PUT YOUR HYPERBEAM EMBED URL HERE ===
    const embedUrl = "https://YOUR-URL-HERE.hyperbeam.com/xxxxxxx";

    async function main() {
      try {
        await Hyperbeam(container, embedUrl, {
          onCursor({ clientX, clientY, userId, color = "#ff0000" }) {
            let el = document.getElementById("c-" + userId);
            if (!el) {
              el = document.createElement("div");
              el.id = "c-" + userId;
              el.className = "cursor";
              el.textContent = "👆";
              document.body.appendChild(el);
            }
            el.style.left = clientX + "px";
            el.style.top = clientY + "px";
            el.style.color = color;
          }
        });
      } catch (e) {
        container.innerHTML = `<div style="padding:40px;color:red;">Error: ${e.message}<br><br>Check your embed URL.</div>`;
      }
    }

    main();
  </script>
</body>
</html>
