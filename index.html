<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperbeam Multi-Cursor</title>
    <style>
      body { margin: 0; font-family: sans-serif; background: #111; color: white; }
      #container {
        width: 100vw;
        height: 100vh;
        background: black;
      }
      .cursor {
        position: absolute;
        width: 32px;
        height: 32px;
        pointer-events: none;
        z-index: 1000;
        transition: opacity 1s;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <script type="module">
      import Hyperbeam from "https://unpkg.com/@hyperbeam/web@latest/dist/index.js";

      const container = document.getElementById("container");

      // ←←← CHANGE THIS TO YOUR OWN HYPERBEAM EMBED URL
      const embedUrl = "https://YOUR-EMBED-URL.hyperbeam.com/....";

      async function main() {
        const hb = await Hyperbeam(container, embedUrl, {
          onCursor({ clientX, clientY, userId }) {
            let cursor = document.getElementById("cursor-" + userId);
            if (!cursor) {
              cursor = document.createElement("div");
              cursor.id = "cursor-" + userId;
              cursor.className = "cursor";
              cursor.innerHTML = "👆";
              document.body.appendChild(cursor);
            }
            cursor.style.left = clientX + "px";
            cursor.style.top = clientY + "px";
          }
        });
      }

      main();
    </script>
  </body>
</html>
