<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperbeam Multi-Cursor Room</title>
    
    <!-- Import the Hyperbeam Web Client SDK -->
    <script src="https://unpkg.com"></script>
    
    <style>
        body {
            margin: 0;
            background-color: #0f111a;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #container {
            width: 80%;
            height: 70vh;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            background-color: #000;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <h1>Collaborative Multi-Cursor Session</h1>
    <button id="start-btn">Launch Workspace</button>
    <div id="container"></div>

    <script>
        document.getElementById('start-btn').addEventListener('click', async () => {
            const containerElement = document.getElementById('container');
            
            try {
                // 1. Request a secure embedURL from your Node background server
                const res = await fetch('http://localhost:8080/create-session', { method: 'POST' });
                const sessionData = await res.json();
                
                if (!sessionData.embed_url) {
                    alert("Initialization error. Check server configurations.");
                    return;
                }

                // 2. Initialize the instance using the fetched client tracking URL
                const hb = await Hyperbeam(containerElement, sessionData.embed_url, {
                    // Hook into multi-cursor movement cycles
                    onCursor({ x, y, userId }) {
                        // Track or render individual cursor points here if building a custom wrapper
                        console.log(`User ${userId} moved mouse to coordinates:`, x, y);
                    }
                });

                console.log("Hyperbeam initialized. Local user identity ID:", hb.userId);

            } catch (err) {
                console.error("Connection sequence broken:", err);
            }
        });
    </script>
</body>
</html>
